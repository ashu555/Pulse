services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: pulse-app:latest
    restart: unless-stopped
    environment: &app-env
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: pulse
      DB_USERNAME: pulse
      DB_PASSWORD: pulse
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      RUN_MIGRATIONS: "true"
      RUN_STORAGE_LINK: "true"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pulse

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-nginx
    image: pulse-web:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - app
    networks:
      - pulse

  queue:
    image: pulse-app:latest
    restart: unless-stopped
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=90
    environment: *app-env
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pulse

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pulse
      MYSQL_USER: pulse
      MYSQL_PASSWORD: pulse
    volumes:
      - pulse-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - pulse

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - pulse-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - pulse

volumes:
  pulse-mysql:
  pulse-redis:

networks:
  pulse:
    driver: bridge
